   item_annot: |
     <p>Представлены модель и прототип платформы автоматизированного формирования индивидуальной образовательной траектории (ИОТ) на основе больших языковых моделей (Large Language Models, LLM) и генерации с дополненной выборкой (Retrieval Augmented Generation, RAG). Выполнен анализ зарубежных и российских цифровых образовательных платформ, показавший, что существующие решения в основном ориентированы на навигацию и рекомендацию отдельных курсов, а также зависят от многоэтапного тестирования и организационных ограничений, что затрудняет оперативное построение ИОТ. Предложенная платформа использует свободное текстовое описание профиля таланта с автоматическим структурированием в формат JSON и генерацией шестимесячной ИОТ. Для повышения обоснованности рекомендаций сформирован корпус курсов Stepik и реализована интеграция RAG. Эксперимент на 1000 профилях показал увеличение точности формирования ИОТ с 80 (LLM-only) до 82,28 % (LLM и RAG). При этом стратегии поиска и отбора курсов из внешнего корпуса образовательных ресурсов (Random, TF-IDF, BM25, Dense Retrieval) снижали качество по сравнению с режимом LLM-only.</p>
