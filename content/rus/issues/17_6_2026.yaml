     <p>Представлены механизмы, ориентированные на реализацию в графической оболочке платформы OpenFOAM дополнительных возможностей по отношению к уже существующим функциям. Проанализирована методика численного моделирования задач механики сплошных сред с помощью программы-решателя shallowWaterFoam. Описаны соображения по выбору технологического стека проекта — языка программирования, вспомогательных фреймворков, СУБД, которые необходимы для создания программной и графической составляющих программного модуля, отвечающего за генерацию численной модели средствами решателя shallowWaterFoam. Сформулированы цель решаемой задачи и этапы ее решения. Приведены структурная и процессная диаграммы, описывающие устройство приложения и логику его работы. Подведены итоги разработки модуля с демонстрацией его работы на примере фундаментальной задачи механики сплошных сред.</p>
