   item_annot: |
     <p>Описан новый подход к синтезу дискретных устройств с обнаружением неисправностей, основанный на использовании логической коррекции сигналов и собственного подмножества множества кодовых слов взвешенного кода с суммированием при синтезе схем встроенного контроля. Отличие подхода от известных состоит в возможности выбора кодовых слов таким образом, чтобы можно было учесть особенности потенциальных ошибок на выходах объекта диагностирования. Это требует, по сути, модификации кода и построения схемы встроенного контроля с учетом его свойств и исключает возможную избыточность при использовании стандартного подхода. В работе предложены алгоритмы синтеза схем встроенного контроля на основе логической коррекции сигналов и специальным образом сформированного подмножества множества кодовых слов взвешенного кода с суммированием. Даны результаты экспериментов, подтверждающие эффективность синтезируемых дискретных устройств по сравнению с классическим методом дублирования. Обсуждаются некоторые особенности метода и перспективы его применения при синтезе устройств и систем с обнаружением неисправностей.</p>
