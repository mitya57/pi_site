     <p>Представлен новый гибридный метод распределенного контроля доступа для роботизированных агентов в децентрализованной киберфизической системе. Научная новизна предлагаемого метода заключается в интеграции усовершенствованной архитектуры графовых нейронных сетей внимания (CAT-GNN, Contextual Attention Temporal Graph Neural Network) с технологиями распределенного реестра (блокчейн). Предлагаемый метод, базирующийся на усовершенствованной архитектуре CAT-GNN, позволяет динамически анализировать поведенческие аномалии и адаптивно корректировать уровень доверия для формирования решений о доступе, которые затем фиксируются в неизменяемом блокчейне. Эксперименты подтвердили статистически значимое превосходство предлагаемого метода на основе архитектуры CAT-GNN над базовой архитектурой графовых нейронных сетей внимания (STAD-GNN, Spatial-Temporal Attention Dynamic Graph Neural Network) по ключевым метрикам (Accuracy, F1-мера, ROC-AUC). Внедрение динамического доверия увеличило долю корректно выполненных задач с 63 до 82 %, а также снизило долю ошибок с более чем 18 до 8 %.</p>
