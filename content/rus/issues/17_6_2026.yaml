   item_name: Оценка сложности программных компонентов архитектуры на основе графового анализа
   item_authors_address: |
     <b>К. Р. Ивашнев</b>, аспирант, науч. сотр., ivashnev@cs.petrsu.ru,
     <b>Д. Ж. Корзун</b>, канд. физ.-мат. наук, доц., dkorzun@cs.karelia.ru,
     Петрозаводский государственный университет
   item_rec_on: 2025-10-24
   item_acc_on: 2025-12-17
   item_annot: |
     <p>Исследованы вопросы применения кибериммунного подхода к проектированию конструктивно-безопасных систем. Методология кибериммунной разработки включает обязательный этап оценки сложности программных компонентов для формирования минимально допустимого набора доверенных компонентов. Существующие подходы к оценке сложности программных систем основаны на характеристиках программной реализации, что затрудняет их применение на ранних этапах проектирования. В данной работе предложен метод оценки сложности программных компонентов, основанный на высокоуровневой архитектуре системы. Выполнена оценка возможностей метода на примере прикладной системы мониторинга новостных материалов об определенном географическом регионе. Полученные результаты показывают, что предлагаемый метод обеспечивает достаточные возможности для распределения компонентов по классам сложности и формирования минимального набора доверенных компонентов на ранних этапах проектирования, когда детальные характеристики программной реализации еще недоступны.</p>
