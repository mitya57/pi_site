     <b>Е. А. Ищукова</b>, канд. техн. наук, вед. науч. сотр., jekky82@mail.ru,
     Научно-технологический университет «Сириус», Федеральная территория «Сириус», Россия
   item_rec_on: 2025-08-05
   item_acc_on: 2025-10-30
   item_annot: |
     <p>Рассмотрены особенности программных реализаций современных алгоритмов асимметричного шифрования RSA и ECDSA. Особый упор сделан на описание математических тонкостей рассматриваемых алгоритмов, которые должны быть учтены в виде проверок используемых параметров при выполнении программных реализаций. Рассмотрен ряд криптографических библиотек с открытым программным кодом для различных языков программирования. Показано, что из рассмотренного перечня библиотек только библиотека openssl отвечает всем требованиям безопасности. Представленные в статье рекомендации будут полезны тем разработчикам, которые выбирают криптографическую библиотеку для своей реализации, а также тем, кто хочет реализовать алгоритмы шифрования RSA и ECDSA самостоятельно.</p>
   item_keywords: криптография, шифр, приватный ключ, публичный ключ, библиотека, уязвимость, ECDSA, RSA
   item_pages: 155—165
