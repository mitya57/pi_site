   item_annot: |
     <p>Представлена улучшенная по сравнению с существующими архитектура системы обнаружения сетевых атак, использующая методы обработки больших данных и глубокого обучения. Архитектура включает два модуля с LSTM-слоями для кратковременного и долговременного анализа цепочек событий. Это позволяет отслеживать многошаговые атаки на основе использования временного анализа. В ходе тестирования на наборе данных Kitsune система показала высокие результаты в многоклассовой классификации. С ее использованием удалось добиться показателей 0,98 по точности и 0,99 по F1-мере, подтвердив эффективность системы в условиях ограниченных ресурсов.</p>
