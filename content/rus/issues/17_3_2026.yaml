   item_rec_on: 2025-09-22
   item_acc_on: 2025-11-11
   item_annot: |
     <p>Рассмотрены вопросы, связанные с организацией безопасных сетевых взаимодействий между клиентскими и сервисными компонентами распределенных систем, разрабатываемых для платформы Linux на основе сетевой архитектуры .NET на языке C#. Описаны возможные подходы к решению этих вопросов в средах программирования Visual Studio Code и Mono, основанные на управлении процедурой «рукопожатия» (handshake) в рамках протокола HTTPS. Приведены результаты экспериментов, позволяющие оценить характеристики быстродействия этих подходов как в режиме одиночных информационных запросов, так и при высокой нагрузке при обработке пакетов одновременных запросов.</p>
