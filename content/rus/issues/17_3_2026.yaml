   item_annot: |
     <p>Рассмотрен подход к решению многокритериальных задач выбора в условиях неполной информации о важности критериев. Представлена модификация метода EDAS (Evaluation based on Distance from Average Solution), позволяющая использовать интервальные оценки весовых коэффициентов, заданные на стандартном симплексе. В рамках предложенного подхода формализованы и проанализированы два новых концептуальных понятия: сильное решение и мягкое EDAS-решение. Практическая применимость разработанного инструментария продемонстрирована на примере решения задачи выбора парового котла.</p>
