   item_name: Об организации безопасного взаимодействия в распределенных системах на основе архитектуры .NET в среде Linux
   item_authors_address: |
     <b>Р. Э. Асратян</b>, канд. техн. наук, вед. науч. сотр., rubezas@yandex.ru,
