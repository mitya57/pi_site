   item_annot: |
     <p>Представлены результаты исследования, направленного на изучение возможностей больших языковых моделей DeepSeek-R1 в области анализа безопасности программ. В частности, исследованы возможности использования таких моделей для классификации типов и формулировки наименований типов уязвимостей программ из списка CWE Top 25, который включает наиболее опасные уязвимости 2024 г. согласно рейтингу каталога CWE. Для оценки моделей построено несколько групп специальных запросов, позволяющих протестировать модели на предмет знания типов уязвимостей, а также способности обнаруживать уязвимости этих типов в программном коде. В результате проведенных экспериментов с моделями был получен ряд статистических данных, позволяющих оценить эффективность моделей в задаче анализа безопасности и обнаружения уязвимостей.</p>
