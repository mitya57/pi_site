     <p>Представлены результаты исследования методологии метрики Чапина для оценки сложности программных продуктов, созданных с применением современных языков программирования. Изложены методические аспекты метрики, отражены ошибки и некорректные подходы, сопровождающие применение метода Чапина в отечественной практике. Показаны методика применения метрики при оценке сложности программного модуля на языке С++ и отличие полученных результатов от данных в отечественной практике.</p>
