   item_annot: |
     <p>Предложены методы распознавания эмоций, вызываемых ситуациями, представленными в текстах русского языка. Разработаны методы выявления и отображения причин возникновения эмоций с помощью атомарных диаграмм частичных моделей. Созданы программные модули для программной системы LogicText, которые позволяют выявлять и анализировать эмоциональные оценки. Для формализации эмоционально окрашенных ситуаций используют оценочные частичные модели. Для распознавания эмоций применяют нейронные сети. Алго­ритм формирования причинно-следственных связей основан на разделении предложений на предикаты и ситуации с помощью программной системы LogicText.</p>
