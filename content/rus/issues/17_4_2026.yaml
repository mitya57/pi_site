   item_annot: |
     <p>Проведен анализ вопросов визуальной геолокации беспилотных воздушных судов в условиях отсутствия сигнала GNSS. Рассмотрены возможности преодоления ограничений классических методов, неустойчивых к фотометрическим и текстурным изменениям аэрофотоснимков. В качестве решения обозначенных проблемных вопросов предложен комплексный подход на основе сверточной нейронной сети CADE-Net, новизна которого заключается в синергии адаптивной архитектуры, механизма внимания и гибридной функции потерь. Разработанный подход позволяет формировать робастные инвариантные признаки, устойчивые к сложным нелинейным искажениям, вызванным сменой сезона, погодных условий и освещения. Результаты работы имеют практическую значимость и могут стать основой для создания полностью автономных и надежных систем навигации беспилотных воздушных судов.</p>
