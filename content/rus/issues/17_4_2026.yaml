     <p>Описана одна из задач для специалистов ИТ-отделов предприятий по разработке комплексов технических средств обеспечения надежной обработки, передачи информации и автоматического восстановления сервисов. Для решения данной задачи предложена система, представляющая собой комплекс технических средств мониторинга и управления, включающий удобный интерфейс для визуализации данных, настройку правил реагирования и анализ истории событий. Решение направлено на обеспечение отказоустойчивости и помехоустойчивости ИТ-инфраструктуры, сокращение времени простоя критически важных сервисов и минимизацию влияния сбоев на бизнес-процессы предприятия, что в конечном счете обеспечивает надежную обработку потоков информации в рамках бизнес-процессов предприятия.</p>
