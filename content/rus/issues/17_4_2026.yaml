   item_annot: |
     <p>Рассмотрена задача оперативного распределения задач в гибридных командах «<люди + чело­векоподобные роботы» для лесной отрасли. Разработана имитационная модель процесса распределения задач для гибридной команды в лесной среде. Предложен распределенный зональный аукционный алгоритм с энергетически осведомленной функцией стоимости, интегрированный с цифровым двойником участка и лесоакторов для компенсации провалов телеметрии при об­рывах связи. Симуляционное исследование охватывает три сценария: эталонную работу при полной связности, периодические потери канала и стресс-режим «тяжелого потока» задач. Показано, что при обрывах связи полнота выполнения задач и сетевой трафик координации остаются на уровне эталона благодаря буферизации и прогнозам двойника; вычислительная стоимость аукциона пренебрежимо мала относительно времен движения. Стресс-испытание выявляет границу масштабируемости, указывая на необходимость адаптивной приоритизации при высоких нагрузках. Результаты подтверждают применимость предложенной схемы к реальным условиям лесозаготовки и намечают направления дальнейших исследований по адаптации весов, энергосбережению и полевой валидации.</p>
