   item_name: Архитектура и реализация программного комплекса для идентификации колес по маркировке с использованием инкрементного обучения
   item_authors_address: |
     <b>А. В. Мареев</b>, аспирант, a.v.mareev@yandex.ru,
     <b>А. А. Орлов</b>, д-р техн. наук, alexeyalexorlov@gmail.com,
