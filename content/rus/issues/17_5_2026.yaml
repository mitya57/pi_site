   item_name: Редкие события в моделях глубокого обучения
   item_authors_address: |
     <b>Ф. М. Барышников</b>, магистр, baryshnikovfm@mail.ru,
     <b>Д. Е. Намиот</b>, д-р техн. наук., вед. науч. сотр., dnamiot@gmail.com,
     МГУ имени М. В. Ломоносова
   item_rec_on: 2025-09-23
   item_acc_on: 2025-12-10
   item_annot: |
     <p>Обнаружение редких событий — задача идентификации явлений, происходящих крайне редко, но имеющих высокую практическую значимость. Основные трудности связаны с ограниченностью положительных примеров, высокой размерностью признакового пространства и динамической природой процессов. Примерами являются редкие заболевания, отказы оборудования и сложные кибератаки.
     Представлен систематический обзор подходов к обнаружению редких событий. Рассмотрены источники редкости, включая объективную редкость явлений, смещения выборки, субъективность аннотирования и ограничения измерений. Проанализированы сложности анализа многомерных временных рядов, такие как пространственные корреляции, краткосрочные и долгосрочные временные зависимости, неизвестная структура временных задержек и комбинированные пространственно-временные эффекты. Рассмотрены методы предварительной обработки, отбора и конструирования признаков, современные архитектуры глубокого обучения, специализированные метрики качества, а также ключевые проблемы и направления дальнейших исследований.</p>
