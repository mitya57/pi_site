   item_annot: |
     <p>Представлена имитационная модель многоагентной системы быстрой доставки товаров на дом, построенная с использованием данных OpenStreetMap (OSM) и реализованная в среде AnyLogic. Цель исследования — разработка имитационной модели многоагентной системы, обеспечивающей максимизацию прибыли сервиса доставки при условии, что 90-й перцентиль времени выполнения заказа не превышает 30 мин. Разработана структура модели, включающая агентов-курьеров, сборщиков, склады и клиентов, которые взаимодействуют в городской среде. Проведены вычислительные эксперименты для анализа сценариев распределения ресурсов и решения задачи имитационной оптимизации с применением методов стохастической аппроксимации. Полученные результаты подтверждают применимость агентного моделирования и данных OSM для проектирования и анализа логистических систем последней мили.</p>
   item_keywords: имитационное моделирование, многоагентные системы, логистика последней мили, оптимизация, AnyLogic, OpenStreetMap
