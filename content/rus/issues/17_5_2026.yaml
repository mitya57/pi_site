     Владимирский государственный университет имени Александра Григорьевича и Николая Григорьевича Столетовых
   item_rec_on: 2025-09-02
   item_acc_on: 2025-11-18
   item_annot: |
     <p>Рассмотрена задача обеспечения прослеживаемости продукции на линии производства железнодорожных колес с помощью компьютерного зрения. Цель работы — проектирование и разработка программной системы идентификации железнодорожных колес по их маркировке. Предложен алгоритм идентификации железнодорожных колес, основанный на нейросетевых моделях YOLOv11 и включающий следующие этапы: локализацию колеса и области маркировки, выравнивание и кадрирование полученной области, сегментацию и классификацию символов маркировки. На шаге классификации символов маркировки применяется инкрементный подход обучения в целях повышения точности распознавания в процессе эксплуатации системы. Разработан пользовательский интерфейс системы. Представлены результаты экспериментальной оценки точности и скорости обработки изображений нейросетевыми моделями, подтверждающие эффективность разработанной системы.</p>
