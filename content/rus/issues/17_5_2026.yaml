   item_annot: |
     <p>Представлен сравнительный анализ производительности двух ключевых технологий для организации двунаправленного обмена данными в веб-приложениях: протокола WebSocket и механизма подписок GraphQL (GraphQL Subscriptions). Обоснована актуальность исследования, связанная с ростом требований к интерактивным системам, и подчеркнут недостаток количественных данных по производительности указанных технологий в научной литературе. Цель исследования — экспериментальная оценка протокола WebSocket и механизма GraphQL-подписок при различных уровнях нагрузки. Описаны архитектура тестового стенда, методика проведения нагрузочного тестирования и ключевые измеряемые метрики. Представлены и проанализированы результаты экспериментов, которые продемонстрировали, что WebSocket обеспечивает меньшие задержки и более низкое потребление ресурсов при пиковых нагрузках. На основе полученных данных сформулирован вывод о наличии фундаментального архитектурного компромисса между низкоуровневой производительностью и высокоуровневым удобством разработки.</p>
