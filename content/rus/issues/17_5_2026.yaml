   item_name: Подход к определению рациональной загруженности вычислителей гетерогенных комплексов обработки данных
   item_authors_address: |
     <b>Р. Ю. Демкин</b> науч. сотр., demkin.rdi-kvant@bk.ru,
     Федеральное государственное унитарное предприятие «Научно-исследовательский институт "КВАНТ"», Москва
   item_rec_on: 2025-10-09
   item_acc_on: 2026-02-10
   item_annot: |
     <p>Рассмотрен вопрос распределения нагрузки на каждый из используемых типов вычислительных устройств в гетерогенном вычислительном комплексе. Предложена аналитическая модель взаимного влияния различных вычислительных устройств в составе гетерогенного вычислителя. На основе рассмотренной модели сформирован подход к распределению нагрузки, способный обеспечить ускорение обработки данных по сравнению с гомогенными решениями. Приведены результаты натурных экспериментов для гетерогенных комплексов, состоящих из CPU и GPU. Продемонстрирована взаимосвязь загруженности ресурсов CPU и производитель­ности GPU. Проведен кросс-валидационный подбор параметров предлагаемой аналитической модели. Рассмотрено применение модели для рационального выбора числа полновесных потоков на CPU и GPU при решении реальных наборов задач. Экспериментально показано преимущество предложенного подхода в скорости решения задач по сравнению с независимо выполняемыми гомогенными решениями. Таким образом, в работе предложен комплексный метод оценки и оптимизации загрузки гетерогенного вычислителя, описаны все необходимые метрики и их аналитические зависимости, приведены экспериментальные подтверждения практической значимости предложенного подхода.</p>
