   item_annot: |
     <p>The paper considers the issue of load distribution on each of the used types of computing devices in a heterogeneous computing system. An analytical model of the mutual influence of various types of computing devices as part of a heterogeneous computer is proposed. Based on the considered model, an approach to load distribution is formed, which can provide acceleration of data processing compared to homogeneous solutions. The results of experiments for heterogeneous systems consisting of CPU and GPU are presented, demonstrating the relationship between CPU resource utilization and GPU performance, based on which the parameters of the proposed analytical model were cross-validated. The application of the model for the rational selection of the number of full-weight threads on CPU and GPU for solving real sets of problems is demonstrated. The advantage of the proposed approach in terms of the speed of tasks solving compared to independently executed homogeneous solutions is experimentally shown. Thus, the article proposes a comprehensive method for evaluating and optimizing the load on a heterogeneous computer, describes all the necessary metrics and their analytical dependencies, and provides experimental evidence of the practical significance of the proposed approach.</p>
