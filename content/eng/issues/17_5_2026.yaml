   item_annot: |
     <p>The paper presents a simulation model of a multi-agent fast home delivery system based on OpenStreetMap (OSM) data, implemented in the AnyLogic environment. The goal of the research is to create a simulation model that maximizes the profit of the delivery service, while ensuring that 90 % of orders are completed within 30 minutes. A model structure has been created that includes couriers, pickers, warehouses, and households in an urban setting. Computational experiments were conducted to analyze different resource allocation scenarios, using stochastic approximation methods to optimize the simulation. The results obtained confirm the usefulness of agent-based modeling and OSM data for the design and analysis of last-mile logistics systems.</p>
