   item_rec_on: November 15, 2025
   item_acc_on: February 25, 2026
   item_annot: |
     <p>The study focuses on an empirical comparison of the performance between the low-level WebSocket transport and the high-level GraphQL Subscriptions abstraction. The paper details the testbed architecture deployed in a cloud environment (2 vCPU, 4 GB RAM) and a load testing methodology involving scenarios with up to 10,000 virtual us­ers. A comprehensive analysis of metrics such as round-trip time (RTT), handshake duration, and server resource consumption was conducted.
     The experimental results demonstrate a significant performance gap between the technologies under peak loads. It was found that WebSocket provides twice the message delivery speed (≈ 216 ms vs ≈ 409 ms) while consuming 4.3 times less CPU time. A key finding of the study is the identification of a technological saturation threshold for GraphQL Subscriptions. Under high load, the GraphQL server reached its resource limit, resulting in a marginal connection growth of less than 0.05 %, whereas WebSocket connections scaled by 791 %. This saturation is further evidenced by a critical degradation of the socket wait time (ws_connecting) for GraphQL, reaching ≈ 17.3 s compared to ≈ 0.54 s for WebSocket. The paper concludes that there is a fundamental architectural trade-off between low-level performance and development convenience, caused by the computational complexity of the application-level logic in GraphQL.</p>
