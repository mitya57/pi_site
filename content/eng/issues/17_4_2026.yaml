   item_annot: |
     <p>This paper considers the problem of operational task allocation in hybrid teams of "humans + humanoid robots" for the forestry industry. A simulation model of the task allocation process for a hybrid team in a forest environment is developed. A distributed zonal auction algorithm with an energy-aware cost function is proposed, integrated with a digital twin of the site and performers to compensate for telemetry failures during communication breaks. The simulation study covers three scenarios: a reference operation with full connectivity, periodic channel losses, and a stress mode of a "heavy flow" of tasks. It is shown that during communication breaks, the completeness of task execution and the network traffic of coordination remain at the level of the reference due to buffering and twin forecasts; the computational cost of the auction is negligible relative to the travel times. The stress test reveals a scalability limit, indicating the need for adaptive prioritization under high loads. The results confirm the applicability of the proposed scheme to real logging conditions and outline directions for further research on scale adaptation, energy saving, and field validation.</p>
   item_keywords: hybrid teams, logging, humanoid robots, simulation modeling, auction algorithm, geo-cohort planning, resilience to connection loss, task distribution
