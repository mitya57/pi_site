   item_annot: |
     <p>Growing volume of text information in natural language these days makes it necessary to develop some valid emotional content analysis these days. The article suggests some methods of emotion recognition in the situations introduced in the Russian texts samples. Methods of identification and representation of emotion occurrence through atomic diagrams of partial models are also given in the article. Some program units for the LogicText software system are created to reveal and analyse the emotional evaluation. And to formalise emotionally colored situations we use evaluating partial models. Neural networks are used to recognise emotions. Causal relationships algorithm is based on dividing sentences into predicates and situations with the help of LogicText softwear system.</p>
   item_keywords: sentiment analysis, emotion recognition, natural language processing, deep learning, ontological model, partial model, atomic diagram
