   item_annot: |
     <p>This article addresses the critical task of visual geolocalization for unmanned aerial vehicles (UAVs) in GNSS-denied environments. It focuses on overcoming the limitations of classical feature-based methods, which are highly sensitive to photometric and textural variations in aerial images captured at different times and under different condi­tions. The paper proposes a comprehensive approach based on a novel convolutional neural network, CADE-Net, which introduces an integration of an adaptive architecture, a cross-attention mechanism, and a hybrid loss function. The core challenge lies in matching a current onboard aerial image against a georeferenced satellite or aerial map from a database despite significant changes caused by varying seasons, weather, and lighting conditions. The proposed CADE-Net architecture is specifically designed to tackle these challenges. It employs a two-stream structure with deformable convolutions to achieve geometric invariance to scale and rotation. Furthermore, a cross-attention mechanism is integrated between the streams to explicitly model the relationships between image pairs, enabling the network to focus on semantically correspondent regions despite their visual differences. The training process is enhanced by a hybrid loss function that combines metric learning principles with an adversarial approach. A key innovation is the intelligent mining strategy for hard negatives, which forces the model to learn fine-grained details by distinguishing between structurally similar but semantically different objects. Proposed approach can generate robust, invariant features that are resilient to complex, non-linear distortions. This work is of significant practical importance for developing fully autonomous and reliable UAV navigation systems capable of operating effectively without GNSS signals.</p>
   item_keywords: visual geolocalization, unmanned aerial vehicle (UAV), GNSS, convolutional neural networks (CNN), image matching, invariant features, deep learning, robust descriptors, image-based navigation
