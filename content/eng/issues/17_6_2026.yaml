   item_annot: |
     <p> The article examines the application of a cyberimmune approach to the development of Secure By Design systems. The cyberimmune development methodology involves evaluating the complexity of software components in order to form the minimum allowed set of trusted components. Existing approaches to assessing the complexity of software systems are based on implementation details and object-oriented characteristics, which makes it difficult to use them in the early stages of design. In this paper, we propose a method for evaluating the complexity of software components based on a high-level system architecture. A demonstration and evaluation of the method's effectiveness is presented based on an analysis of a real-world system that monitors news articles related to a specific geographical area. The presented assessment allows us to conclude that the proposed method has sufficient predictive power for predicting the distribution of components into complexity classes and forming a minimum set of trusted components, even without knowledge of software implementation details in the early stages of the design process.</p>
   item_keywords:  graph models, cybersecurity, cyberimmunity, cluster analysis, Secure By Design, system engineering
