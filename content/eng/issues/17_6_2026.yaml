   item_annot: |
     <p> A new approach to the design of discrete devices with fault detection is described, based on the use of Boolean signal correction and a subset of the set of codewords of weight-based sum code during the design of concurrent error detection circuits. The difference between this approach and known approaches is the ability to select codewords in such a way that the characteristics of potential errors at the outputs of the object being diagnosed can be taken into account. This essentially requires modifying the code and constructing a built-in concurrent error detection circuit, taking into account its properties, and eliminating possible redundancy when using the standard approach. The paper proposes algorithms for designing built-in concurrent error detection circuits based on Boolean signal correction and a subset of the set of codewords of weight-based sum code. Experimental results are given, confirming the effectiveness of the designed discrete devices relative to the classical method of duplication, with a comparison of results. Some features of the method and prospects for its application in the designs of devices and systems with fault detection are discussed.</p>
   item_keywords: discrete devices with fault detection; self-checking devices; error detection at the outputs of discrete devices; own subset of the set of codewords; design of the concurrent error detection circuit
