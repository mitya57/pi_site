   item_annot: |
     <p>This paper presents a model and a prototype of a software platform for the automated formation of an individual educational trajectory (IET) based on Large Language Models (LLM) and Retrieval-Augmented Generation (RAG). An analytical review of international and Russian digital educational platforms is conducted, demonstrating that existing solutions are primarily focused on navigation and recommendation of individual courses or programs and often rely on multi-stage testing procedures and organizational mediation. These characteristics significantly limit the flexibility and operational efficiency of IET construction, especially in scenarios where rapid personalization is required.
     The proposed platform adopts a fundamentally different approach by using a free-text description of a talent profile as the primary input. The input data are automatically structured into a JSON format and used to generate a six-month individual educational trajectory. To improve the grounding, consistency, and relevance of recommendations, a dedicated corpus of educational courses was constructed using materials from the Stepik platform and integrated into the generation pipeline via a RAG module.
     An experimental evaluation was performed on a dataset of 1,000 talent profiles generated under controlled conditions. The quality of the generated IETs was assessed using the LLM-as-a-judge methodology, with an independent evaluation model. Several generation modes were compared, including LLM-only generation and multiple retrieval-based strategies. The results show that the integration of RAG increases IET generation accuracy from 80 % (LLM-only) to 82.28 %. At the same time, simple retrieval strategies, such as Random, TF-IDF, BM25, and Dense Retrieval, were found to reduce overall quality compared to the LLM-only baseline.</p>
