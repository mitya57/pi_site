   item_annot: |
     <p>This paper presents mechanisms for implementing additional functionality in the graphical shell of OpenFOAM platform, in addition to existing functions. It analyzes the methodology for numerical modeling of continuum mechanics problems using the shallowWaterFoam solver and the structure of the corresponding computational case, including dictionary files with the problem's computational parameters. It describes the considerations for choosing technology stack of the project—the programming language, auxiliary frameworks, and DBMS required creating the software and graphical components of the software module responsible for generating the numerical model using the shallowWaterFoam solver. The problem statement and the stages of its solution are defined. Structural and process diagrams describing structure and operational logic of the application are provided, along with a brief overview of the diagrams' main content. Development of the module is summarized, with a demonstration of its operation using a fundamental continuum mechanics problem as an example. The main window of the graphical shell, the main screen forms, and the associated graphical controls are displayed. The aspects that distinguish the project from similar solutions and constitute the originality of the research are defined. A link to a public GitHub repository containing the structure of the application's packages and modules, as well as the executable source code, is provided.</p>
