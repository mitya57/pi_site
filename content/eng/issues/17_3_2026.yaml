   item_name: Potential Vulnerabilities in Software Implementations of Asymmetric Ciphers
   item_authors_address: |
     <b>E. A. Ishchukova</b>, Cand. Sc. (Eng.), Leading Researcher, jekky82@mail.ru,
     Scientific Center for Information Technologies and Artificial Intelligence, Sirius University of Science and Technology, Sirius Federal Territory, 354340, Russian Federation
   item_corr_author: 'Evgeniya A. Ishchukova, Cand. Sc. (Eng.), Leading Researcher, Scientific Center for Information Technologies and Artificial Intelligence, Sirius University of Science and Technology, Sirius Federal Territory, 354340, Russian Federation, E-mail: jekky82@mail.ru'
   item_rec_on: August 05, 2025
   item_acc_on: October 30, 2025
   item_annot: |
     <p>The aim of the work is to check the correctness of the software implementations of the asymmetric RSA and ECDSA algorithms as part of cryptographic libraries with open source code. And also to form a list of checks for the parameters of the RSA and ECDSA algorithms, the implementation of which will allow obtaining correct software implementations. The RSA encryption algorithm is based on modular arithmetic and works with large numbers in finite fields. The complexity of the algorithm is based on the complexity of the factorization problem, that is, the com­plexity of decomposing a number into prime factors. The ECDSA algorithm is a digital signature algorithm based on the use of elliptic curves. The ECDSA algorithm is based on the mathematics of cyclic groups of elliptic curves over finite fields. The main advantage of the ECDSA algorithm is the use of numbers several times smaller than in RSA, while maintaining approximately the same margin of reliability. Particular emphasis is placed on the description of the mathematical subtleties of the algorithms under consideration, which should be taken into account in the form of checks of the parameters used when performing software implementations, such as: the quality and dimension of the prime numbers used, the correct choice of initial parameters, the correct implementation of the operations performed, and others. A number of cryptographic libraries with open source code for various programming languages are con­sidered. It is shown that from the list of libraries considered, only the cpenssl library meets all security requirements. The recommendations presented in the article will be useful both for those developers who choose a cryptographic library for their implementation, and for those who want to implement the RSA and ECDSA encryption algorithms themselves.</p>
   item_keywords: cryptography, cipher, private key, public key, library, vulnerability, ECDSA, RSA
