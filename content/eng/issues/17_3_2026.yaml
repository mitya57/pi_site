   item_name: Detecting Multi-Step Attacks on IoT Devices Using Machine Learning and Big Data Processing Methods
   item_authors_address: |
     <b>I. V. Zelichenok</b>, Junior Researcher, zelichenok@comsec.spb.ru,
     <b>I. V. Kotenko</b>, D. Sc. (Eng.), Professor, ivkote@comsec.spb.ru,
