   item_annot: |
     <p>The study explores the capabilities of these large language models in the domain of security analysis. Specifically, it investigates the models' ability to classify vulnerability types and descriptions from the CWE Top 25 category, which includes the most dangerous vulnerabilities for 2024 according to the CWE catalog ranking. To evaluate the models, several sets of specialized queries are constructed. These queries test the models' knowledge of vulnerability types as well as their ability to detect these types of vulnerabilities in source code. The experiments conducted with the models yielded a body of statistical data, allowing for an assessment of the models' effectiveness in the tasks of security analysis and vulnerability detection.</p>
