   item_annot: |
     <p>The problems related to the organization of secure network interactions between client and service components of distributed systems developed for the Linux platform based on the .NET network architecture in C# are considered. Possible approaches to solving these problems in the Visual Studio Code and Mono programming environments are described. Experimental results are presented to evaluate the performance characteristics of these approaches. In particular, it is shown that gRPC and REST technologies based on the use of the Kestrel web server provide high performance under high service loads that occur when processing a large number of simultaneously received requests. A new approach to protecting HTTP/SOAP requests to web-services developed in Mono environment and located in Apache or Nginx web-servers for Linux platform is described. Unlike VPN or SSL/TLS tunnel technology, which involves installing two tunnel components: a client component on the workstation and a server component on the server, the proposed approach is based on using only one intermediary component: an HTTPS adapter on the workstation that "communicates" with the client over HTTP and with a web server over HTTPS protocol. As this study has shown, this approach allows for high processing speed of single requests to the service, significantly exceeding the processing speed of single requests in GRPC and REST technologies using the Kestrel web service.</p>
   item_keywords: distributed systems, Internet, information security, web service, gRPC, REST, HTTPS, private key, certificate, OpenSSL
