   item_corr_author: 'Igor V. Kotenko, Professor, Saint Petersburg Federal Research Center of the Russian Academy of Sciences (SPC RAS), 199178, Russian Federation E-mail: ivkote@comsec.spb.ru'
   item_rec_on: July 29, 2025
   item_acc_on: September 19, 2025
   item_annot: |
     <p>This paper presents an improved architecture of a network attack detection system using big data processing and deep learning methods. The architecture includes two modules with LSTM layers for short-term and long-term analysis of event chains, which allows one to track multi-stage attacks through the implementation of temporal analysis. The combination of modules allows one not only to promptly detect current threats, but also to reconstruct attack scenarios using big data and deep learning methods. This approach differs from existing solutions due to the ability to dynamically adapt to changing attack patterns and work in conditions of limited computing resources. The approach proposed in this paper incorporates big data processing techniques based on batch learning, parallel computing, and the use of database clusters capable of processing a large number of events per second, which reduces the response time of the security system to incidents. During testing on the Kitsune dataset, the system showed high results in multi-class classification, reaching 0.94 in accuracy and 0.91 in F1-measure, confirming its efficiency in conditions of limited resources. The obtained results confirm the potential of using the proposed NIDS architecture for detecting multi-step attacks and confirm its ability to work with big data even under conditions of limited computing resources.</p>
   item_keywords: information security, multi-stage attacks, network attack detection, Internet of Things, machine learning, deep learning, neural networks, iterative learning, big data processing, dynamic NoSQL databases
